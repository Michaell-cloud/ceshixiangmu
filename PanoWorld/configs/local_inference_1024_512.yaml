# 本地开发/调试用配置 (CPU 模式)
# 完整 GPU 推理请使用 Colab

model:
  class_name: model.PanoWorldLRM

  patch_factor: 2
  dim1: 256
  dim2: 512
  dim3: 1024
  num_register_tokens: 4
  head_dim: 64
  inter_multi: 4
  qk_norm: true
  stage1_nlayer: 2
  stage2_nlayer: 4
  stage3_nlayer: 8
  patch_size: 2
  in_channels: 12
  output_gs: true

  gaussians:
    sh_degree: 1
    opacity_degree: 2
    near_plane: 0.01
    far_plane: 1000000.0
    scale_bias: -6.9
    scale_max: -1.2
    opacity_bias: 1.0
    align_to_pixel: true
    max_dist: 15.0
    min_dist: 0.1

data:
  # 本地数据路径，需要在 Colab 上同步为对应路径
  root_data_dir: "./data/RealSee3D_eval"
  data_path: "data_realsee3D/realsee3D_1024_1024_20260507_whole_room_map_json_eval_8views.txt"
  square_crop: true
  resize_h: 512
  resize_h_pano: 512
  sample_target_images: 6
  viewpoint_max_view: 8
  filter_top_down: false

training:
  train_stage: 1

inference:
  dataset_name: dataset.Dataset
  amp_dtype: bf16
  use_amp: true
  batch_size_per_gpu: 1
  num_threads: 8
  num_workers: 4
  prefetch_factor: 4
  use_tf32: true
  # 本地模型路径占位，需要在 Colab 上修改为实际路径
  ckpt_path: ./model_ckpt/ckpt_panoworld_lrm_1024_512.pt
  out_dir: ./outputs/inference_1024_512_8views
